<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>めとろのーむ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --border: #2a2a2a;
            --accent: #c8f060;
            --accent-dim: #8aaa30;
            --text: #e8e8e8;
            --muted: #666;
            --playing-bg: #1a2a08;
            --delete-accent: #ff4444;
            --confirm-bg: #c8f060;
            --confirm-text: #0f0f0f;
            --highlight-bg: #252525;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        button:focus { outline: none; }

        html {
            background: #000;
            min-height: 100%;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--muted);
        }
        .vol-row { display: flex; align-items: center; gap: 6px; }
        .vol-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }
        #volumeControl {
            -webkit-appearance: none;
            width: 80px; height: 3px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        #volumeControl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .bpm-section {
            padding: 16px 14px 12px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        #bpmDisplay {
            font-family: 'DM Mono', monospace;
            font-size: 64px;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -2px;
        }
        .bpm-label {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.1em;
            padding-bottom: 6px;
        }

        #scrollArea {
            margin: 0 14px;
            height: 52px;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--muted);
            transition: all 0.15s;
        }
        #scrollArea:hover { background: #1a1a1a; }
        #scrollArea.playing {
            border-color: var(--accent-dim);
            background: var(--playing-bg);
            color: var(--accent);
        }

        .pulse-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 8px;
            opacity: 0;
        }
        #scrollArea.playing .pulse-dot { opacity: 1; }

        .controls {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
        }
        #saveBPMButton {
            flex: 1;
            height: 34px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.15s;
        }
        #saveBPMButton:hover { border-color: var(--accent-dim); color: var(--accent); }
        #deleteModeBtn {
            height: 34px;
            width: 84px;
            flex-shrink: 0;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            white-space: nowrap;
        }
        #deleteModeBtn.active {
            border-color: var(--delete-accent);
            color: var(--delete-accent);
            background: rgba(255,68,68,0.06);
        }

        .scroll-hint {
            padding: 0 14px 8px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.08em;
            color: var(--muted);
            opacity: 0.5;
        }

        .favorites-header {
            padding: 6px 14px 4px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }

        #favorites {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 8px;
        }
        #favorites::-webkit-scrollbar { width: 3px; }
        #favorites::-webkit-scrollbar-track { background: transparent; }
        #favorites::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .favorite {
            display: flex;
            align-items: stretch;
            border-radius: 5px;
            margin: 2px 0;
            border: 1px solid transparent;
            transition: all 0.1s;
            cursor: pointer;
            overflow: hidden;
        }
        .favorite:hover { background: var(--highlight-bg); border-color: var(--border); }
        .favorite.highlight { background: var(--highlight-bg); border-color: var(--border); }
        .favorite.confirmed { background: var(--confirm-bg) !important; border-color: transparent !important; }
        .favorite.confirmed .bpm,
        .favorite.confirmed .editable { color: var(--confirm-text) !important; }
        .favorite.deletable { background: rgba(255,68,68,0.04); }
        .favorite.deletable:hover { background: rgba(255,68,68,0.12); border-color: rgba(255,68,68,0.3); }
        .favorite.deletable .bpm { color: var(--delete-accent) !important; }

        .favorite > .bpm {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            width: 42px;
            min-width: 42px;
            padding: 7px 8px;
            color: var(--accent);
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
            letter-spacing: 0.05em;
        }
        .favorite > .editable {
            flex: 1;
            padding: 7px 10px;
            font-size: 12px;
            color: var(--text);
            white-space: normal;
            word-break: break-all;
            overflow: hidden;
            outline: none;
            align-items: center;
        }
        .favorite > .editable[contenteditable="true"] {
            white-space: normal;
            background: rgba(200,240,96,0.05);
        }
        .empty-hint {
            padding: 20px 14px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <!-- click.mp3をaudioタグで読み込む（fetchのCORSを回避） -->
    <audio id="clickAudio" src="click.mp3" preload="auto"></audio>

    <header>
        <span class="logo">めとろのーむ</span>
        <div class="vol-row">
            <span class="vol-label">VOL</span>
            <input id="volumeControl" type="range" min="0" max="1" step="0.05" value="0.5">
        </div>
    </header>

    <div class="bpm-section">
        <div id="bpmDisplay">120</div>
        <span class="bpm-label">BPM</span>
    </div>

    <div id="scrollArea">
        <span class="pulse-dot" id="pulseDot"></span>
        <span id="playText">CLICK TO PLAY</span>
    </div>

    <div class="controls">
        <button id="saveBPMButton">SAVE BPM</button>
        <button id="deleteModeBtn" onclick="toggleDeleteMode()">DELETE</button>
    </div>

    <div class="scroll-hint">SCROLL / ↑↓ TO CHANGE BPM &nbsp;·&nbsp; SPACE TO TOGGLE</div>

    <div class="favorites-header">SAVED</div>
    <div id="favorites"></div>

    <script src="script.js" defer></script>
</body>
</html>
